name: iOS Cloud Build

on:
  push:
    branches:
      - main
  workflow_dispatch: # 允许手动触发

jobs:
  build-ios:
    name: Build and Upload iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install the Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # 创建临时文件
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # 把 GitHub Secrets 里的 Base64 密码串还原成证书文件
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # 创建一台临时 Mac 钥匙串
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # 将证书导入这台临时 Mac
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # 将描述文件应用到这台临时 Mac
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS App (Signed)
        run: flutter build ipa --release --export-method app-store

      - name: Upload IPA Artifact (备份到 GitHub，以防上传失败)
        uses: actions/upload-artifact@v4
        with:
          name: BabyTracker-iOS-Signed
          path: build/app/outputs/flutter-apk/app.ipa # Flutter 默认的 ipa 输出路径，或者 build/ios/ipa/*.ipa
          
      - name: Upload to App Store Connect
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
        run: |
          echo "开始上传到苹果商店..."
          # 查找生成的 ipa 文件
          IPA_FILE=$(find build/ios/ipa -name "*.ipa" | head -n 1)
          echo "找到 IPA 文件: $IPA_FILE"
          
          # 苹果规定使用 xcrun altool 工具进行上传
          xcrun altool --upload-app -f "$IPA_FILE" -t ios -u "$APPLE_ID" -p "$APP_SPECIFIC_PASSWORD"
