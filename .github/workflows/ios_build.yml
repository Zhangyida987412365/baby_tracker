name: iOS Cloud Build

on:
  push:
    branches:
      - main
  workflow_dispatch: # 允许手动触发

jobs:
  build-ios:
    name: Build and Upload iOS App
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install the Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # 创建临时文件
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # 把 GitHub Secrets 里的 Base64 密码串还原成证书文件（剔除任何可能导致报错的回车换行）
          echo "$BUILD_CERTIFICATE_BASE64" | tr -d '\n\r ' | base64 --decode -o $CERTIFICATE_PATH
          echo "$BUILD_PROVISION_PROFILE_BASE64" | tr -d '\n\r ' | base64 --decode -o $PP_PATH

          # 创建一台临时 Mac 钥匙串
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # 将证书导入这台临时 Mac
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # 将描述文件应用到这台临时 Mac
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Configure Xcode for Manual Signing
        run: |
          echo "Force Manual Code Signing in project.pbxproj"
          perl -pi -e 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          perl -pi -e 's/PRODUCT_BUNDLE_IDENTIFIER = com.baby.jsx;/PRODUCT_BUNDLE_IDENTIFIER = com.baby.jsx;\n\t\t\t\tDEVELOPMENT_TEAM = AJ7X5R24YH;\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "jsxBaby";\n\t\t\t\tCODE_SIGN_IDENTITY = "Apple Distribution";/g' ios/Runner.xcodeproj/project.pbxproj

      - name: Build iOS App (Signed)
        run: |
          # 创建 ExportOptions.plist 解决无法导出 ipa 的问题
          cat <<EOF > ios/ExportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>AJ7X5R24YH</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.baby.jsx</key>
              <string>jsxBaby</string>
            </dict>
          </dict>
          </plist>
          EOF
          
          # 使用明确的导出配置来打包
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      - name: Upload IPA Artifact (备份到 GitHub，以防上传失败)
        uses: actions/upload-artifact@v4
        with:
          name: BabyTracker-iOS-Signed
          path: "**/*.ipa"
          
      - name: Upload to App Store Connect
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
        run: |
          echo "开始上传到苹果商店..."
          # 全局查找生成的 ipa 文件
          IPA_FILE=$(find . -name "*.ipa" | grep -v "Pods" | head -n 1)
          echo "找到 IPA 文件: $IPA_FILE"
          
          if [ -z "$IPA_FILE" ]; then
            echo "错误：没有找到 .ipa 文件！可能是导出步骤失败了。"
            exit 1
          fi

          # 苹果规定使用 xcrun altool 工具进行上传
          xcrun altool --upload-app -f "$IPA_FILE" -t ios -u "$APPLE_ID" -p "$APP_SPECIFIC_PASSWORD"
